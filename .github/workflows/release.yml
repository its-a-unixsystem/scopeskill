name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: sv-cli-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: sv-cli-darwin-amd64
          - goos: linux
            goarch: amd64
            name: sv-cli-linux-amd64
          - goos: windows
            goarch: amd64
            name: sv-cli-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - run: go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.name }}" ./cmd/sv-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
